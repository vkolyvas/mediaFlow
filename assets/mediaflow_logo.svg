<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Flow lines (interconnected paths) -->
  <path d="M60 140 Q80 100 100 100 Q120 100 140 60"
        stroke="url(#flowGrad)" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M40 100 Q70 90 100 100 Q130 110 160 100"
        stroke="url(#flowGrad)" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M80 160 Q100 130 100 100 Q100 70 120 40"
        stroke="url(#flowGrad)" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- Play button (media symbol) inside a hexagon-like node -->
  <polygon points="100,25 155,55 155,125 100,155 45,125 45,55"
           fill="none" stroke="url(#flowGrad)" stroke-width="3"
           opacity="0.3"/>
  <polygon points="100,40 140,60 140,120 100,140 60,120 60,60"
           fill="#0f172a" stroke="url(#nodeGrad)" stroke-width="2"/>

  <!-- Play triangle (media) -->
  <polygon points="88,75 88,125 128,100" fill="url(#flowGrad)"/>

  <!-- Flow nodes (dots along paths) -->
  <circle cx="60" cy="140" r="6" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="8" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="140" cy="60" r="6" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="100" r="4" fill="#06b6d4" opacity="0.6"/>
  <circle cx="160" cy="100" r="4" fill="#ec4899" opacity="0.6"/>
  <circle cx="80" cy="160" r="5" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="120" cy="40" r="5" fill="#ec4899" opacity="0.7"/>

  <!-- Sound wave bars (flow indicator) -->
  <rect x="75" y="165" width="4" height="12" rx="2" fill="#3b82f6" opacity="0.5"/>
  <rect x="84" y="160" width="4" height="20" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="93" y="155" width="4" height="28" rx="2" fill="#ec4899" opacity="0.7"/>
  <rect x="102" y="158" width="4" height="22" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="111" y="162" width="4" height="16" rx="2" fill="#3b82f6" opacity="0.5"/>

  <!-- Text label -->
  <text x="100" y="195" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#flowGrad)" text-anchor="middle">mediaFlow</text>
</svg>